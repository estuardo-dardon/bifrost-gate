# Configuration for git-cliff
# Más info: https://github.com/orhun/git-cliff

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""

# Changelog body
body = """
{% if version %}\
    ## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper }}
    {% for commit in commits %}
    - {% if commit.breaking %}🚨 **BREAKING**: {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/estuardodardon/bifrost/commit/{{ commit.id }}))
    {%- endfor %}
{% endfor %}\n
"""

# Changelog footer
footer = """
<!-- generated by git-cliff -->
"""

# Commit processors
commit_processors = [
    { message_processor = [
        { pattern = "\\(#([0-9]+)\\)", replace = "([#${1}](https://github.com/estuardodardon/bifrost/pull/${1}))" }
    ]}
]

# Commit extractors
commit_extractors = [
    { pattern = "feat", group = "Features" },
    { pattern = "fix", group = "Bug Fixes" },
    { pattern = "perf", group = "Performance" },
    { pattern = "refactor", group = "Refactoring" },
    { pattern = "test", group = "Testing" },
    { pattern = "docs", group = "Documentation" },
    { pattern = "ci", group = "CI/CD" },
    { pattern = "chore", group = "Miscellaneous" }
]

[git]
# Conventional commit parser
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test", group = "Testing" },
    { message = "^docs", group = "Documentation" },
    { message = "^ci", group = "CI/CD" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^revert", skip = true },
    { message = "^merge", skip = true }
]

# Protect breaking changes
protect_breaking_commits = false

# Skip tags matching this pattern
skip_tags = "^v?[0-9]+\\.[0-9]+\\.[0-9]+-?.*$"
